<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FP 강사소개 및 세미나 랜딩페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2f3b89',      /* 메인 남색 */
                        primaryLight: '#7e8be2', /* 연보라색 */
                        accent: '#2f3b89',
                        bgGray: '#f8f9fa',       /* 옅은 배경 회색 */
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #333333; }
        
        /* 모달 스크롤바 커스텀 */
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: #f1f1f1; }
        .modal-content::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .modal-content::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* 탭 전환 스타일 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 카테고리 그리드 테두리 */
        .category-grid {
            border-top: 1px solid #e5e7eb;
            border-left: 1px solid #e5e7eb;
        }
        .category-btn {
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #e5e7eb;
        }
    </style>
</head>
<body class="antialiased font-sans">
    <div class="min-h-screen bg-white max-w-7xl mx-auto px-4 md:px-8 shadow-sm">

    <!-- Header -->
    <header class="bg-white sticky top-0 z-40">
        <!-- 최상단 미니 메뉴 -->
        <div class="border-b border-gray-100">
            <div class="container mx-auto px-4 max-w-7xl">
                <div class="flex justify-end items-center py-2 text-[11px] text-gray-500 space-x-3">
                    <a href="#" class="hover:text-gray-800">운영자님</a>
                    <a href="#" class="hover:text-gray-800 before:content-['|'] before:mr-3 before:text-gray-300">관리자</a>
                    <a href="#" class="hover:text-gray-800 before:content-['|'] before:mr-3 before:text-gray-300">회원사</a>
                    <a href="#" class="hover:text-gray-800 before:content-['|'] before:mr-3 before:text-gray-300">마이페이지</a>
                    <a href="#" class="hover:text-gray-800 before:content-['|'] before:mr-3 before:text-gray-300">로그아웃</a>
                </div>
            </div>
        </div>
        
        <!-- 메인 네비게이션 -->
        <div class="border-b border-gray-200 bg-white">
            <div class="container mx-auto px-4 max-w-7xl">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center cursor-pointer" onclick="switchTab('landing')">
                        <!-- 로고 영역 -->
                        <div class="text-2xl font-black text-primary tracking-tighter flex items-center">
                            <i class="fas fa-project-diagram mr-2 text-primary"></i> FP
                        </div>
                        <div class="ml-2 text-[10px] text-gray-500 leading-tight hidden sm:block">
                            온·오프 융합<br>세일즈 역량강화 플랫폼
                        </div>
                    </div>
                    
                    <nav class="hidden lg:flex items-center space-x-5 text-[13px] font-medium text-gray-700">
                        <a href="#" class="hover:text-primary rounded-full border border-gray-300 px-3 py-1.5 text-xs">콘텐츠보관함</a>
                        <a href="#" class="bg-primary text-white px-3 py-1.5 rounded-full text-xs hover:bg-opacity-90">무료체험</a>
                        <a href="#" class="hover:text-primary">FP자료실</a>
                        <a href="#" class="hover:text-primary">개설과정</a>
                        <a href="#" class="hover:text-primary">커뮤니티</a>
                        <a href="#" class="hover:text-primary">추천리뷰</a>
                        <a href="#" class="hover:text-primary">이용권 구입</a>
                        <a href="#" class="text-primary font-bold">강사소개</a>
                    </nav>

                    <div class="flex space-x-2">
                        <button onclick="switchTab('admin')" class="px-3 py-1.5 text-xs font-medium text-white bg-primary rounded shadow-sm hover:bg-opacity-90 transition flex items-center">
                            <i class="fas fa-user-cog mr-1.5"></i>강사 등록
                        </button>
                        <button onclick="switchTab('admin-poster')" class="px-3 py-1.5 text-xs font-medium text-white bg-primaryLight rounded shadow-sm hover:bg-opacity-90 transition flex items-center">
                            <i class="fas fa-pen mr-1.5"></i>공고 글쓰기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 사용자 화면 탭 (랜딩) -->
    <div id="landing-tab" class="tab-content active">
        
        <!-- Hero 배너 -->
      <!-- 🌟 새로운 1280x300 광고 이미지 배너 영역 -->
        <section class="w-full py-6">
            <div class="w-full aspect-[1280/300] max-h-[300px] rounded-lg overflow-hidden shadow-sm">
                <img 
                    src="https://i.ibb.co/RGXZ6Wp1/AI-260630-1.png](https://i.ibb.co/RGXZ6Wp1/AI-260630-1.png" 
                    alt="메인 광고 배너" 
                    class="w-full h-full object-cover"
                />
            </div>
        </section>
        
        <!-- 검색 및 카테고리 섹션 -->
        <section class="pt-12 pb-8 bg-white">
            <div class="container mx-auto px-4 max-w-5xl">
                
                <div class="flex flex-col md:flex-row items-center justify-center space-y-3 md:space-y-0 md:space-x-4 mb-6">
                    
                    <h3 class="text-2xl font-black text-gray-900 tracking-tight">어떤 강사를 찾고 계신가요?</h3>
                    
                </div>
                
                <div class="flex justify-center mb-10">
                    <div class="w-full max-w-2xl relative">
                        <input type="text" id="search-input" placeholder="검색어를 입력해주세요." 
                               class="w-full py-3 pl-5 pr-12 rounded bg-gray-50 border border-gray-200 text-sm text-gray-700 focus:outline-none focus:border-primary transition-all">
                        <button id="search-btn" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-primary">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>

                <div class="category-grid grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 w-full mb-10 bg-white" id="category-filters">
                    <!-- JS에서 버튼 생성 -->
                </div>

                <div class="flex justify-center space-x-2 mb-4">
                    <button id="tag-all" onclick="setTagFilter('all')" class="px-5 py-2 text-[13px] rounded-full bg-primary text-white font-medium transition-colors">전체보기</button>
                    <button id="tag-famous" onclick="setTagFilter('제휴강사')" class="px-5 py-2 text-[13px] rounded-full border border-gray-300 text-gray-600 hover:text-primary font-medium transition-colors bg-white">제휴강사</button>
                    <button id="tag-recommended" onclick="setTagFilter('추천강사')" class="px-5 py-2 text-[13px] rounded-full border border-gray-300 text-gray-600 hover:text-primary font-medium transition-colors bg-white">추천강사</button>
                </div>
            </div>
        </section>

        <!-- 강사 리스트 섹션 -->
        <section class="py-6 bg-white">
            <div class="container mx-auto px-4 max-w-7xl">
                
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center">
                        <div class="w-1.5 h-5 bg-primary mr-2.5"></div>
                        <h3 class="text-[17px] font-bold text-gray-900" id="list-title">전체 강사</h3>
                    </div>
                    <button class="text-xs text-gray-500 hover:text-gray-800 bg-gray-50 px-2 py-1 rounded">
                        총 <span id="instructor-count" class="font-bold text-primary">0</span>명
                    </button>
                </div>

                <div id="instructor-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
                    <!-- JS에서 카드 생성 -->
                </div>

                <div id="no-data-msg" class="hidden text-center py-20 text-gray-400">
                    <i class="fas fa-search text-3xl mb-3"></i>
                    <p class="text-sm">조건에 맞는 강사가 없습니다.</p>
                </div>

            </div>
        </section>

        <!-- 지점 세미나 및 공고 포스터 섹션 -->
        <section class="py-12 bg-white mt-4">
            <div class="container mx-auto px-4 max-w-7xl">
                
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center">
                        <div class="w-1.5 h-5 bg-primaryLight mr-2.5"></div>
                        <h3 class="text-[17px] font-bold text-gray-900">대한민국 보험 공개 강좌 안내</h3>
                    </div>
                    <button class="text-xs text-gray-500 hover:text-gray-800 bg-gray-50 px-2 py-1 rounded" onclick="switchTab('admin-poster')">
                        글쓰기 <i class="fas fa-chevron-right text-[10px] ml-1"></i>
                    </button>
                </div>

                <div id="poster-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                    <!-- JS에서 카드 생성 -->
                </div>
            </div>
        </section>
        
        <!-- 푸터 여백 -->
        <div class="h-20 bg-white"></div>
    </div>

    <!-- [관리자] 강사 등록 탭 -->
    <div id="admin-tab" class="tab-content bg-bgGray min-h-screen py-10">
        <div class="container mx-auto px-4 max-w-4xl">
            <div class="bg-white rounded border border-gray-200 overflow-hidden shadow-sm">
                <div class="bg-primary text-white px-6 py-4 flex items-center justify-between">
                    <h2 class="text-lg font-bold" id="admin-form-title">강사 등록 / 수정</h2>
                    <button onclick="cancelAdminForm()" class="text-white hover:text-gray-200"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="p-6 md:p-8 space-y-6">
                    <div class="border border-gray-200 rounded-sm p-5">
                        <label class="block text-sm font-bold text-gray-800 mb-4">분야 선택 <span class="text-xs font-normal text-red-500 ml-2">*최대 3개</span></label>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="admin-category-checkboxes">
                            <!-- JS 생성 -->
                        </div>
                    </div>

                    <div class="border border-gray-200 rounded-sm p-5">
                        <label class="block text-sm font-bold text-gray-800 mb-4">강사 태그</label>
                        <div class="flex flex-wrap gap-5">
                            <label class="flex items-center space-x-2 text-sm text-gray-600 cursor-pointer">
                                <input type="radio" name="admin_tag" value="none" checked class="text-primary w-4 h-4 focus:ring-primary">
                                <span>선택안함</span>
                            </label>
                            <label class="flex items-center space-x-2 text-sm text-gray-600 cursor-pointer">
                                <input type="radio" name="admin_tag" value="제휴강사" class="text-primary w-4 h-4 focus:ring-primary">
                                <span>제휴강사</span>
                            </label>
                            <label class="flex items-center space-x-2 text-sm text-gray-600 cursor-pointer">
                                <input type="radio" name="admin_tag" value="추천강사" class="text-primary w-4 h-4 focus:ring-primary">
                                <span>추천강사</span>
                            </label>
                        </div>
                    </div>

                    <div class="space-y-5">
                        <div class="flex flex-col md:flex-row md:items-center pt-4 border-t border-gray-100">
                            <label class="w-32 text-sm font-bold text-gray-800 mb-2 md:mb-0">강의 제목</label>
                            <input type="text" id="admin-title" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primary" placeholder="예: 거절을 승낙으로 바꾸는 화법">
                        </div>
                        <div class="flex flex-col md:flex-row md:items-center pt-4 border-t border-gray-100">
                            <label class="w-32 text-sm font-bold text-gray-800 mb-2 md:mb-0">강사명</label>
                            <input type="text" id="admin-name" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primary" placeholder="강사명을 입력하세요">
                        </div>
                        <div class="flex flex-col md:flex-row md:items-start pt-4 border-t border-gray-100">
                            <label class="w-32 text-sm font-bold text-gray-800 mt-2 mb-2 md:mb-0">프로필 사진</label>
                            <div class="flex-1">
                                <input type="file" id="admin-photo" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 cursor-pointer border border-gray-300 rounded-sm p-1">
                            </div>
                        </div>
                        <div class="flex flex-col md:flex-row md:items-start pt-4 border-t border-gray-100">
                            <label class="w-32 text-sm font-bold text-gray-800 mt-2 mb-2 md:mb-0">소개문구</label>
                            <textarea id="admin-intro" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primary h-20 resize-none" placeholder="짧은 소개글을 입력하세요."></textarea>
                        </div>
                        <div class="flex flex-col md:flex-row md:items-start pt-4 border-t border-gray-100">
                            <label class="w-32 text-sm font-bold text-gray-800 mt-2 mb-2 md:mb-0">상세 프로필</label>
                            <textarea id="admin-profile" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primary h-32 resize-none" placeholder="경력, 학력 등 상세 프로필 (엔터로 줄바꿈)"></textarea>
                        </div>
                        <div class="flex flex-col md:flex-row md:items-center pt-4 border-t border-gray-100">
                            <label class="w-32 text-sm font-bold text-gray-800 mb-2 md:mb-0">연락처</label>
                            <input type="text" id="admin-phone" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primary" placeholder="예: 02-525-1686">
                        </div>
                        <div class="pt-4 border-t border-gray-100">
                            <label class="block text-sm font-bold text-gray-800 mb-3">영상 등록 (임베드 URL 최대 3개)</label>
                            <div class="space-y-2">
                                <input type="text" id="admin-video-1" class="w-full p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primary" placeholder="영상 1 URL">
                                <input type="text" id="admin-video-2" class="w-full p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primary" placeholder="영상 2 URL">
                                <input type="text" id="admin-video-3" class="w-full p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primary" placeholder="영상 3 URL">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-2 border-t border-gray-200">
                    <button class="px-5 py-2 border border-gray-300 rounded-sm text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors" onclick="cancelAdminForm()">취소</button>
                    <button id="admin-submit-btn" class="px-6 py-2 bg-primary rounded-sm text-sm font-bold text-white hover:bg-opacity-90 transition-colors shadow-sm" onclick="saveInstructor()">등록하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- [관리자] 포스터 공고 등록 탭 -->
    <div id="admin-poster-tab" class="tab-content bg-bgGray min-h-screen py-10">
        <div class="container mx-auto px-4 max-w-4xl">
            <div class="bg-white rounded border border-gray-200 overflow-hidden shadow-sm">
                <div class="bg-primaryLight text-white px-6 py-4 flex items-center justify-between">
                    <h2 class="text-lg font-bold" id="admin-poster-form-title">공고 글쓰기</h2>
                    <button onclick="cancelPosterAdminForm()" class="text-white hover:text-gray-100"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="p-6 md:p-8 space-y-5">
                    <div class="flex flex-col md:flex-row md:items-center pt-2">
                        <label class="w-32 text-sm font-bold text-gray-800 mb-2 md:mb-0">공고 제목</label>
                        <input type="text" id="admin-poster-title" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primaryLight" placeholder="예: 성공적인 숏폼 마케팅 세미나">
                    </div>

                    <div class="flex flex-col md:flex-row md:items-center pt-4 border-t border-gray-100">
                        <label class="w-32 text-sm font-bold text-gray-800 mb-2 md:mb-0">일시</label>
                        <input type="text" id="admin-poster-date" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primaryLight" placeholder="예: 2026년 6월 20일 (토) 14:00 - 17:00">
                    </div>

                    <div class="flex flex-col md:flex-row md:items-center pt-4 border-t border-gray-100">
                        <label class="w-32 text-sm font-bold text-gray-800 mb-2 md:mb-0">장소</label>
                        <input type="text" id="admin-poster-location" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primaryLight" placeholder="예: 강남구 테헤란로 대교육장">
                    </div>

                    <div class="flex flex-col md:flex-row md:items-start pt-4 border-t border-gray-100">
                        <label class="w-32 text-sm font-bold text-gray-800 mt-2 mb-2 md:mb-0">포스터 이미지</label>
                        <div class="flex-1">
                            <input type="file" id="admin-poster-image" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 cursor-pointer border border-gray-300 rounded-sm p-1">
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row md:items-start pt-4 border-t border-gray-100">
                        <label class="w-32 text-sm font-bold text-gray-800 mt-2 mb-2 md:mb-0">상세 안내</label>
                        <textarea id="admin-poster-desc" class="flex-1 p-2.5 border border-gray-300 rounded-sm text-sm focus:outline-none focus:border-primaryLight h-40 resize-none" placeholder="대상, 혜택, 세부 프로그램 등 상세 내용을 입력하세요."></textarea>
                    </div>
                </div>

                <div class="bg-gray-50 px-6 py-4 flex justify-end space-x-2 border-t border-gray-200">
                    <button class="px-5 py-2 border border-gray-300 rounded-sm text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors" onclick="cancelPosterAdminForm()">취소</button>
                    <button id="admin-poster-submit-btn" class="px-6 py-2 bg-primaryLight rounded-sm text-sm font-bold text-white hover:bg-opacity-90 transition-colors shadow-sm" onclick="savePoster()">등록하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 강사 모달 -->
    <div id="instructor-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col transform scale-95 transition-transform duration-300">

            <!-- 헤더 (흰색 바: 강사명 + 뱃지) -->
            <div class="flex justify-between items-center px-7 py-4 bg-white flex-shrink-0 z-10">
                <h3 class="text-xl font-black text-gray-900 flex items-center tracking-tight" id="modal-name">강사명</h3>
                <div class="flex items-center space-x-3">
                    <button onclick="startEdit()" class="text-xs px-3 py-1.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium rounded-sm transition flex items-center shadow-sm">
                        <i class="fas fa-edit mr-1.5"></i> 수정
                    </button>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- 본문 -->
            <div id="modal-body" class="modal-content overflow-y-auto flex-1 bg-[#e6eafd]">

                <!-- 히어로: 좌 텍스트 / 우 사진 -->
                <div class="flex flex-col md:flex-row md:min-h-[500px]">

                    <!-- 왼쪽: 텍스트 -->
                    <div class="w-full md:w-[58%] min-w-0 p-7 md:p-10 flex flex-col">
                        <p id="modal-categories" class="text-[13px] font-bold text-gray-800 mb-3"></p>
                        <h4 id="modal-title" class="text-[26px] md:text-[32px] font-black text-blue-600 leading-[1.25] tracking-tight mb-5 break-keep">타이틀</h4>
                        <p id="modal-intro" class="text-[14px] text-gray-700 leading-[1.85] break-keep mb-7">소개문구</p>

                        <!-- 주요 프로필 -->
                        <div class="border-t border-gray-400/40 pt-5 mb-7">
                            <h5 class="text-[15px] font-bold text-gray-900 mb-3 flex items-center">

        filtered = filtered.filter(inst => inst.categories && inst.categories.includes(currentFilter));
    }

    // 3. 제휴강사 / 추천강사 필터링 ('제휴' / '추천' 단어 완벽 지원)
    if (currentTag && currentTag !== 'all' && currentTag !== '전체') {
        filtered = filtered.filter(inst => {
            const tagStr = String(currentTag);
            const typeStr = String(inst.type || '');
            const specStr = String(inst.specialTag || '');

            if (tagStr.includes('제휴')) {
                return typeStr.includes('제휴') || specStr.includes('제휴');

            if (tagStr.includes('추천')) {
                return typeStr.includes('추천') || specStr.includes('추천');

       function openModal(id) {

    const isRec = typeStr.includes('추천');
    const theme = isRec
        ? { bg: '#e4f5ea', badge: 'bg-emerald-700', text: 'text-emerald-700', icon: 'text-emerald-600' }

                <span class="inline-flex items-center ml-3 px-4 py-1 rounded-sm text-[13px] font-bold text-white shadow-sm ${theme.badge}">${inst.type}</span>
            `;
        }
        modalNameEl.innerHTML = `${inst.name}${badgeHtml}`;
    }

    if (profIcon) profIcon.className = `fas fa-user-circle mr-2 text-lg ${theme.icon}`;

       contactContainer.innerHTML = `

                <p class="text-[11px] text-gray-500 leading-relaxed">${typeNotice}</p>
            </div>
        `;
    }

   const vContainer = document.getElementById('modal-videos');
    if (vContainer) {
        vContainer.innerHTML = '';
        
        if (inst.videos && inst.videos.length > 0) {
            inst.videos.forEach(url => {
                let embedUrl = url;

                // 1. 유튜브 단축 주소 (youtu.be) 변환
                if (url.includes('youtu.be/')) {
                    const videoId = url.split('youtu.be/')[1].split('?')[0];
                    embedUrl = `https://www.youtube.com/embed/${videoId}`;
                }
                // 2. 유튜브 일반 주소 (youtube.com) 변환
                else if (url.includes('youtube.com/watch')) {
                    const urlParams = new URLSearchParams(new URL(url).search);
                    const videoId = urlParams.get('v');
                    if (videoId) {
                        embedUrl = `https://www.youtube.com/embed/${videoId}`;
                    }
                }
                // 3. 비메오 주소 (vimeo.com) 변환
                else if (url.includes('vimeo.com/')) {
                    const vimeoId = url.split('vimeo.com/')[1].split('?')[0].split('/')[0];
                    embedUrl = `https://player.vimeo.com/video/${vimeoId}?badge=0&autopause=0&player_id=0&app_id=58479`;
                }

                // 가로 3개 배치용 그리드 아이템 추가
                vContainer.innerHTML += `
                    <div class="w-full aspect-video rounded-md border border-gray-200 overflow-hidden shadow-sm">

                            class="w-full h-full"
                            frameborder="0" 
                            allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                            referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen>
                        </iframe>
                    </div>
                `;
            });
        } else { 
            vContainer.innerHTML = '<p class="text-xs text-gray-400 py-4">등록된 영상이 없습니다.</p>'; 
        }
    }

    toggleModal('instructor-modal', true);

    if (locEl) locEl.textContent = poster.location;

    const topicEl = document.getElementById('poster-modal-topic');
    if (topicEl) topicEl.textContent = poster.topic || '';

    const descEl = document.getElementById('poster-modal-desc');
    if (descEl) descEl.textContent = poster.description;

    // 2. 찾아오는 길 (약도 및 지도 버튼) 영역 처리
    const routeArea = document.getElementById('modalRouteArea');
    if (routeArea) {
        const hasRouteInfo = poster.mapImage || poster.route || poster.mapUrl;

        if (hasRouteInfo) {
            routeArea.classList.remove('hidden');

            // 약도 이미지 처리
            const mapImg = document.getElementById('modalMapImage');
            if (mapImg) {
                if (poster.mapImage) {
                    mapImg.src = poster.mapImage;
                    mapImg.classList.remove('hidden');
                } else {
                    mapImg.classList.add('hidden');
                }
            }

            // 길 안내 텍스트 처리
            const routeDesc = document.getElementById('modalRouteDescription');
            if (routeDesc) {
                if (poster.route) {
                    routeDesc.textContent = poster.route;
                    routeDesc.classList.remove('hidden');
                } else {
                    routeDesc.classList.add('hidden');
                }
            }

            // 네이버 지도 버튼 처리
            let mapBtn = document.getElementById('naver-map-btn');
            if (poster.mapUrl) {
                if (!mapBtn) {
                    mapBtn = document.createElement('a');
                    mapBtn.id = 'naver-map-btn';
                    mapBtn.target = '_blank';
                    mapBtn.rel = 'noopener noreferrer';
                    mapBtn.className = 'inline-flex items-center justify-center w-full bg-[#03C75A] text-white font-bold py-2.5 px-4 rounded-sm mt-3 hover:bg-[#02b351] transition-colors text-sm shadow-sm';
                    routeArea.appendChild(mapBtn);
                }
                mapBtn.href = poster.mapUrl;
                mapBtn.innerHTML = '<i class="fas fa-map-marker-alt mr-2"></i>네이버 지도로 길찾기';
                mapBtn.style.display = 'inline-flex';
            } else if (mapBtn) {
                mapBtn.style.display = 'none';
            }
        } else {
            routeArea.classList.add('hidden');
        }
    }

    // 3. 모달 팝업 창 띄우기
    toggleModal('poster-modal', true);
}

   function toggleModal(id, show) {
            const el = document.getElementById(id);
            if (!el) return;
            if (show) {
                el.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                setTimeout(() => {
                    el.classList.remove('opacity-0');
                    el.firstElementChild.classList.remove('scale-95');
                    el.firstElementChild.classList.add('scale-100');
                }, 10);
            } else {
                el.classList.add('opacity-0');
                el.firstElementChild.classList.remove('scale-100');
                el.firstElementChild.classList.add('scale-95');
                setTimeout(() => { el.classList.add('hidden'); document.body.style.overflow = 'auto'; }, 300);
            }
        }

        function closeModal() { toggleModal('instructor-modal', false); }
        function closePosterModal() { toggleModal('poster-modal', false); }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('instructor-modal')?.addEventListener('click', function(e) { if (e.target === this) closeModal(); });
            document.getElementById('poster-modal')?.addEventListener('click', function(e) { if (e.target === this) closePosterModal(); });
        });

        function switchTab(tabId) {
            if (tabId === 'admin' && editingId === null) resetAdminFormUI();
            if (tabId === 'admin-poster' && editingPosterId === null) resetPosterAdminFormUI(); 
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`${tabId}-tab`).classList.add('active');
            window.scrollTo(0, 0);
        }

        // --- 관리자 폼 공통 로직 ---
        function startEdit() {
            const inst = instructors.find(i => i.id === currentModalId); if (!inst) return;
            editingId = inst.id;
            document.getElementById('admin-name').value = inst.name; document.getElementById('admin-title').value = inst.title;
            document.getElementById('admin-intro').value = inst.intro; document.getElementById('admin-profile').value = inst.profile;
            document.getElementById('admin-phone').value = inst.phone;
            document.getElementById('admin-video-1').value = inst.videos[0] || ''; document.getElementById('admin-video-2').value = inst.videos[1] || ''; document.getElementById('admin-video-3').value = inst.videos[2] || '';
            document.querySelectorAll('input[name="category"]').forEach(cb => cb.checked = inst.categories.includes(cb.value));
            const tagRadio = document.querySelector(`input[name="admin_tag"][value="${inst.specialTag}"]`);
            if (tagRadio) tagRadio.checked = true; else document.querySelector(`input[name="admin_tag"][value="none"]`).checked = true;
            document.getElementById('admin-photo').value = '';
            
            document.getElementById('admin-form-title').textContent = "강사 수정";
            const btn = document.getElementById('admin-submit-btn'); btn.textContent = "수정하기"; btn.classList.replace('bg-primary', 'bg-green-600');
            closeModal(); switchTab('admin');
        }

        function resetAdminFormUI() {
            editingId = null;
            document.getElementById('admin-form-title').textContent = "강사 등록";
            const btn = document.getElementById('admin-submit-btn'); btn.textContent = "등록하기"; btn.classList.replace('bg-green-600', 'bg-primary');
            ['name','title','intro','profile','phone','photo','video-1','video-2','video-3'].forEach(id => document.getElementById('admin-'+id).value = '');
            document.querySelectorAll('input[name="category"]').forEach(cb => cb.checked = false);
            const defaultTag = document.querySelector('input[name="admin_tag"][value="none"]'); if(defaultTag) defaultTag.checked = true;
        }

        function cancelAdminForm() { resetAdminFormUI(); switchTab('landing'); }

        function saveInstructor() {
            const name = document.getElementById('admin-name').value.trim();
            if (!name) { alert("강사명을 입력해주세요."); return; }
            const categoryNodes = document.querySelectorAll('input[name="category"]:checked');
            const selectedCategories = Array.from(categoryNodes).map(cb => cb.value);
            if (selectedCategories.length === 0) { alert("분야를 최소 1개 이상 선택해주세요."); return; }

            const newData = {
                name: name, title: document.getElementById('admin-title').value.trim(), intro: document.getElementById('admin-intro').value.trim(),
                profile: document.getElementById('admin-profile').value.trim(), phone: document.getElementById('admin-phone').value.trim(),
                categories: selectedCategories, specialTag: document.querySelector('input[name="admin_tag"]:checked')?.value || 'none',
                videos: ['admin-video-1', 'admin-video-2', 'admin-video-3'].map(id => document.getElementById(id).value.trim()).filter(v => v)
            };

            const photoInput = document.getElementById('admin-photo');
            if (photoInput.files[0]) newData.photo = URL.createObjectURL(photoInput.files[0]);

            if (editingId) {
                const idx = instructors.findIndex(i => i.id === editingId);
                if (idx > -1) { Object.assign(instructors[idx], newData); alert("수정되었습니다!"); }
            } else {
                newData.id = instructors.length > 0 ? Math.max(...instructors.map(i => i.id)) + 1 : 1;
                if (!newData.photo) newData.photo = "https://images.unsplash.com/photo-1544717305-2782549b5136?auto=format&fit=crop&q=80&w=800";
                instructors.unshift(newData); alert("등록되었습니다!");
            }
            cancelAdminForm(); renderFilters(); setTagFilter('all');
        }

        function startPosterEdit() {
            const p = posters.find(x => x.id === currentPosterModalId); if (!p) return;
            editingPosterId = p.id;
            document.getElementById('admin-poster-title').value = p.title; document.getElementById('admin-poster-date').value = p.date;
            document.getElementById('admin-poster-location').value = p.location; document.getElementById('admin-poster-desc').value = p.description;
            document.getElementById('admin-poster-image').value = '';
            document.getElementById('admin-poster-form-title').textContent = "공고 수정";
            const btn = document.getElementById('admin-poster-submit-btn'); btn.textContent = "수정하기"; btn.classList.replace('bg-primaryLight', 'bg-green-600');
            closePosterModal(); switchTab('admin-poster');
        }

        function resetPosterAdminFormUI() {
            editingPosterId = null;
            document.getElementById('admin-poster-form-title').textContent = "공고 글쓰기";
            const btn = document.getElementById('admin-poster-submit-btn'); btn.textContent = "등록하기"; btn.classList.replace('bg-green-600', 'bg-primaryLight');
            ['title','date','location','desc','image'].forEach(id => document.getElementById('admin-poster-'+id).value = '');
        }

        function cancelPosterAdminForm() { resetPosterAdminFormUI(); switchTab('landing'); }

        function savePoster() {
            const title = document.getElementById('admin-poster-title').value.trim();
            if (!title) { alert("제목을 입력해주세요."); return; }

            const newData = {
                title: title, date: document.getElementById('admin-poster-date').value.trim() || '-',
                location: document.getElementById('admin-poster-location').value.trim() || '-', description: document.getElementById('admin-poster-desc').value.trim()
            };
            const fileInput = document.getElementById('admin-poster-image');
            if (fileInput.files[0]) newData.image = URL.createObjectURL(fileInput.files[0]);

            if (editingPosterId) {
                const idx = posters.findIndex(p => p.id === editingPosterId);
                if (idx > -1) { Object.assign(posters[idx], newData); alert("수정되었습니다."); }
            } else {
                newData.id = posters.length > 0 ? Math.max(...posters.map(p => p.id)) + 1 : 1;
                if (!newData.image) newData.image = "https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&q=80&w=800";
                posters.unshift(newData); alert("등록되었습니다.");
            }
            cancelPosterAdminForm(); renderPosters();
        }

        window.onload = init;
    </script>
  </div>
</body>
</html>
